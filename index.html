<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f2eee5" />
    <script>
      try {
        const theme = localStorage.getItem("badge3d-color-theme");
        const isDark =
          theme === "dark" ||
          (theme !== "light" &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        if (theme === "light" || theme === "dark")
          document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]').content = isDark
          ? "#171816"
          : "#f2eee5";
      } catch {}
    </script>
    <meta
      name="description"
      content="Paste a Shields.io badge URL, preview the raised model, and export a print-ready STL."
    />
    <link rel="canonical" href="https://badge3d.litomore.me/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Badge3D" />
    <meta property="og:title" content="Badge3D — Turn Shields.io badges into 3D models" />
    <meta
      property="og:description"
      content="Paste a Shields.io badge URL, preview the raised model, and export a print-ready STL."

    <meta property="og:url" content="https://badge3d.litomore.me/" />

    <meta property="og:image:width" content="1200" />
